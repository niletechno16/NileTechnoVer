<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="iSoA_5JqTTbepfUwQShRrlH0p-10fUXwZt6rpi5wgrw" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>تغيير كلمة المرور</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --border: #2e3250;
            --accent: #4f6ef7;
            --accent2: #7c3aed;
            --text: #e8eaf6;
            --muted: #8b91b0;
            --red: #ef4444;
            --green: #22c55e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
        }

        .top {
            text-align: center;
            margin-bottom: 28px;
        }

        .top .icon {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            margin: 0 auto 14px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .top h2 {
            font-size: 20px;
            font-weight: 800;
        }

        .top p {
            color: var(--muted);
            font-size: 13px;
            margin-top: 6px;
            line-height: 1.6;
        }

        .field {
            margin-bottom: 18px;
        }

        .field label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .field .opt-badge {
            font-size: 11px;
            color: var(--accent);
            background: rgba(79, 110, 247, .12);
            padding: 2px 8px;
            border-radius: 10px;
            margin-right: 6px;
        }

        .field .input-wrap {
            position: relative;
        }

        .field .input-wrap i {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 14px;
        }

        .field input {
            width: 100%;
            padding: 12px 40px 12px 14px;
            background: rgba(255, 255, 255, .04);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color .2s;
        }

        .field input:focus {
            border-color: var(--accent);
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 22px 0;
        }

        .optional-label {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .optional-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .btn {
            width: 100%;
            padding: 13px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            font-family: 'Cairo', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity .2s;
            margin-top: 8px;
        }

        .btn:hover {
            opacity: .88;
        }

        .msg {
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .msg-error {
            background: rgba(239, 68, 68, .12);
            border: 1px solid rgba(239, 68, 68, .2);
            color: var(--red);
        }

        .msg-success {
            background: rgba(34, 197, 94, .12);
            border: 1px solid rgba(34, 197, 94, .2);
            color: var(--green);
        }
    </style>
</head>

<body>
    <div class="box">
        <div class="top">
            <div class="icon"><i class="fa-solid fa-lock"></i></div>
            <h2>تغيير كلمة المرور</h2>
            <p>أول دخول — يجب تغيير كلمة المرور الافتراضية<br>قبل الاستمرار</p>
        </div>

        {% if messages %}
        {% for msg in messages %}
        <div class="msg {% if msg.tags == 'success' %}msg-success{% else %}msg-error{% endif %}">
            <i class="fa-solid {% if msg.tags == 'success' %}fa-circle-check{% else %}fa-circle-xmark{% endif %}"></i>
            {{ msg }}
        </div>
        {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <!-- باسورد جديد - إجباري -->
            <div class="field">
                <label>كلمة المرور الجديدة</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" name="new_password" placeholder="6 أحرف على الأقل" required>
                </div>
            </div>
            <div class="field">
                <label>تأكيد كلمة المرور</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" name="confirm_password" placeholder="••••••••" required>
                </div>
            </div>

            <div class="divider"></div>

            <!-- إيميل - اختياري -->
            <div class="optional-label"><i class="fa-solid fa-envelope"></i> إضافة إيميل</div>
            <div class="field">
                <label>
                    البريد الإلكتروني
                    <span class="opt-badge">اختياري</span>
                </label>
                <div class="input-wrap">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" name="email" placeholder="example@email.com">
                </div>
            </div>

            <button type="submit" class="btn">
                <i class="fa-solid fa-check"></i> حفظ والمتابعة
            </button>
        </form>
    </div>
</body>

</html>
